<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Event Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #f0f6fc;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    header h1 svg { width: 28px; height: 28px; fill: #f0f6fc; }

    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.6rem;
      font-size: 0.82rem;
      color: #8b949e;
    }

    .pulse {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3fb950;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    .countdown {
      font-weight: 600;
      color: #58a6ff;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
    }

    #event-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .event-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .event-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 1rem;
    }

    .icon-push    { background: #1f3d2a; color: #3fb950; }
    .icon-pr      { background: #1a2d4a; color: #58a6ff; }
    .icon-merge   { background: #2d1f4a; color: #a371f7; }

    .event-body { flex: 1; }

    .event-message {
      font-size: 0.95rem;
      color: #e6edf3;
      line-height: 1.5;
    }

    .event-message strong { color: #58a6ff; }
    .event-message em     { color: #3fb950; font-style: normal; font-weight: 500; }

    .event-time {
      font-size: 0.75rem;
      color: #6e7681;
      margin-top: 0.3rem;
    }

    .badge {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-push  { background: #1f3d2a; color: #3fb950; }
    .badge-pr    { background: #1a2d4a; color: #58a6ff; }
    .badge-merge { background: #2d1f4a; color: #a371f7; }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #6e7681;
    }

    .empty-state svg { width: 48px; height: 48px; fill: #30363d; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <h1>
      <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub Event Monitor
    </h1>
    <div class="status-bar">
      <span class="pulse"></span>
      <span>Live · refreshes in <span class="countdown" id="countdown">15</span>s</span>
      <span id="last-updated"></span>
    </div>
  </header>

  <div class="container">
    <div id="event-list">
      <div class="empty-state">
        <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        <p>No events yet. Push to your repo or open a pull request to see activity here.</p>
      </div>
    </div>
  </div>

  <script>
    const INTERVAL = 15;
    let countdown = INTERVAL;

    function formatMessage(event) {
      const author = `<strong>${event.author}</strong>`;
      const from   = event.from_branch ? `<em>${event.from_branch}</em>` : '';
      const to     = `<em>${event.to_branch}</em>`;

      if (event.action === 'PUSH') {
        return `${author} pushed to ${to} on ${event.timestamp}`;
      } else if (event.action === 'PULL_REQUEST') {
        return `${author} submitted a pull request from ${from} to ${to} on ${event.timestamp}`;
      } else if (event.action === 'MERGE') {
        return `${author} merged branch ${from} to ${to} on ${event.timestamp}`;
      }
      return `${author} performed an action on ${event.timestamp}`;
    }

    function getBadge(action) {
      const map = {
        'PUSH': ['badge-push', 'Push'],
        'PULL_REQUEST': ['badge-pr', 'Pull Request'],
        'MERGE': ['badge-merge', 'Merge'],
      };
      const [cls, label] = map[action] || ['badge-push', action];
      return `<span class="badge ${cls}">${label}</span>`;
    }

    function getIcon(action) {
      if (action === 'PUSH')
        return `<div class="event-icon icon-push">↑</div>`;
      if (action === 'PULL_REQUEST')
        return `<div class="event-icon icon-pr">⇄</div>`;
      if (action === 'MERGE')
        return `<div class="event-icon icon-merge">⊕</div>`;
      return `<div class="event-icon icon-push">•</div>`;
    }

    async function fetchEvents() {
      try {
        const res = await fetch('/events');
        const data = await res.json();
        const list = document.getElementById('event-list');

        if (!data.events || data.events.length === 0) {
          list.innerHTML = `
            <div class="empty-state">
              <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
              <p>No events yet. Push to your repo or open a pull request to see activity here.</p>
            </div>`;
          return;
        }

        list.innerHTML = data.events.map(event => `
          <div class="event-card">
            ${getIcon(event.action)}
            <div class="event-body">
              <div class="event-message">${formatMessage(event)} ${getBadge(event.action)}</div>
            </div>
          </div>
        `).join('');

        document.getElementById('last-updated').textContent =
          `· Last updated: ${new Date().toLocaleTimeString()}`;

      } catch (err) {
        console.error('Failed to fetch events:', err);
      }
    }

    function startCountdown() {
      setInterval(() => {
        countdown--;
        document.getElementById('countdown').textContent = countdown;
        if (countdown <= 0) {
          countdown = INTERVAL;
          fetchEvents();
        }
      }, 1000);
    }

    fetchEvents();
    startCountdown();
  </script>
</body>
</html>
